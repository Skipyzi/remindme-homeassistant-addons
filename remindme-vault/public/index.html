<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>RemindMe Vault</title>
		<link rel="stylesheet" href="styles.css" />
	</head>
	<body>
		<div class="app" id="app">
			<!-- Far-left ribbon: workspace-level actions, Obsidian-style. -->
			<nav class="ribbon" aria-label="Actions">
				<button id="rb-new" class="ribbon-btn" title="New note" aria-label="New note">＋</button>
				<button id="rb-folder" class="ribbon-btn" title="New folder" aria-label="New folder">🗀</button>
				<button id="rb-daily" class="ribbon-btn" title="Daily note" aria-label="Daily note">📅</button>
				<button id="rb-graph" class="ribbon-btn" title="Graph view" aria-label="Graph view">◕</button>
				<button id="rb-reload" class="ribbon-btn" title="Reload vault" aria-label="Reload vault">⟳</button>
			</nav>

			<!-- File explorer: a folder tree over the vault storage. -->
			<aside class="explorer" aria-label="Notes">
				<div class="explorer-head">
					<input id="search" type="search" placeholder="Search notes…" aria-label="Search notes" />
				</div>
				<div id="starred" class="starred" hidden>
						<h4>★ Starred</h4>
						<ul id="starred-list" class="starred-list"></ul>
					</div>
					<div id="tree" class="tree"></div>
			</aside>

			<!-- Draggable divider: explorer ↔ workspace. -->
			<div id="explorer-gutter" class="hgutter" role="separator" aria-orientation="vertical"></div>

			<!-- Main workspace: the editor by default, the graph as a pane. -->
			<main class="workspace">
				<section id="editor-pane" class="pane editor-pane">
					<div class="tabbar">
						<span id="tab-title" class="tab">New note</span>
						<div class="mode-toggle" role="group" aria-label="View mode">
							<button data-mode="edit" class="mode-btn active">Edit</button>
							<button data-mode="split" class="mode-btn">Split</button>
							<button data-mode="read" class="mode-btn">Read</button>
						</div>
					</div>
					<div class="edit-head">
						<input id="note-title" class="title-input" placeholder="Title" aria-label="Title" />
						<div class="meta-row">
							<label class="meta-field"
								>Type / folder
								<input
									id="note-type"
									list="group-list"
									placeholder="e.g. project"
									aria-label="Type or folder"
							/></label>
							<label class="meta-field"
								>Tags
								<input
									id="note-tags"
									placeholder="comma separated"
									aria-label="Tags"
							/></label>
						</div>
						<datalist id="group-list"></datalist>
					</div>
					<div id="editor-toolbar" class="editor-toolbar" role="toolbar" aria-label="Formatting">
						<button type="button" data-action="bold" title="Bold (Ctrl+B)"><b>B</b></button>
						<button type="button" data-action="italic" title="Italic (Ctrl+I)"><i>I</i></button>
						<button type="button" data-action="strike" title="Strikethrough"><s>S</s></button>
						<span class="tb-sep" aria-hidden="true"></span>
						<button type="button" data-action="h1" title="Heading 1">H1</button>
						<button type="button" data-action="h2" title="Heading 2">H2</button>
						<button type="button" data-action="h3" title="Heading 3">H3</button>
						<span class="tb-sep" aria-hidden="true"></span>
						<button type="button" data-action="ul" title="Bullet list">•&nbsp;List</button>
						<button type="button" data-action="ol" title="Numbered list">1.&nbsp;List</button>
						<button type="button" data-action="task" title="Task list">☑&nbsp;Task</button>
						<button type="button" data-action="quote" title="Quote">❝</button>
						<span class="tb-sep" aria-hidden="true"></span>
						<button type="button" data-action="link" title="Link (Ctrl+K)">🔗</button>
						<button type="button" data-action="code" title="Inline code">&lt;/&gt;</button>
						<button type="button" data-action="codeblock" title="Code block">{&nbsp;}</button>
						<button type="button" data-action="table" title="Table">▦</button>
						<button type="button" data-action="mermaid" title="Diagram (Mermaid)">◆&nbsp;Diagram</button>
						<span class="tb-sep" aria-hidden="true"></span>
						<button type="button" id="tb-undo" data-action="undo" title="Undo (Ctrl+Z)" disabled>↶</button>
						<button type="button" id="tb-redo" data-action="redo" title="Redo (Ctrl+Shift+Z)" disabled>↷</button>
						<button type="button" id="tb-outline" data-action="outline" title="Outline">☰&nbsp;Outline</button>
						<button type="button" id="tb-history" data-action="history" title="History timeline">⧗&nbsp;History</button>
					</div>
					<aside id="outline-panel" class="history-panel outline-panel" hidden>
						<header class="history-head">
							<span>Outline</span>
							<button id="outline-close" class="hp-close" title="Close" aria-label="Close">✕</button>
						</header>
						<ul id="outline-list" class="outline-list"></ul>
					</aside>
					<aside id="history-panel" class="history-panel" hidden>
						<header class="history-head">
							<span>History</span>
							<button id="history-close" class="hp-close" title="Close" aria-label="Close">✕</button>
						</header>
						<ul id="history-list" class="history-list"></ul>
					</aside>
					<div id="edit-split" class="edit-split" data-mode="edit">
						<textarea
							id="note-body"
							class="source"
							spellcheck="false"
							placeholder="# Write markdown…&#10;Link notes with [[Another note]] and tag with #topic."
							aria-label="Note body"
						></textarea>
						<div id="split-gutter" class="vgutter" role="separator" aria-orientation="horizontal"></div>
						<div id="preview" class="preview markdown" aria-label="Preview"></div>
					</div>
					<div class="editor-actions">
						<button id="save-btn" class="btn">Save</button>
						<button id="delete-btn" class="btn danger" disabled>Delete</button>
						<button id="star-btn" class="btn star-btn" title="Star this note" disabled>☆</button>
						<span id="save-status" class="save-status"></span>
					</div>
					<div class="backlinks">
						<h4>Linked &amp; related</h4>
						<ul id="backlink-list"></ul>
					</div>
				</section>

				<!-- Draggable divider: editor ↕ constellation. -->
				<div id="graph-gutter" class="rgutter" role="separator" aria-orientation="horizontal" hidden></div>

				<section id="graph-pane" class="pane graph-pane" hidden>
					<div class="tabbar">
						<span class="tab">Constellation</span>
						<button id="graph-close" class="tab-close" title="Close" aria-label="Close graph">✕</button>
					</div>
					<div id="graph-mount" class="graph-mount"></div>
				</section>
			</main>
		</div>
		<ul id="autocomplete" class="autocomplete" hidden></ul>
		<div id="palette" class="palette" hidden>
			<div class="palette-box">
				<input id="palette-input" class="palette-input" type="text" placeholder="Open a note…" aria-label="Palette" />
				<ul id="palette-list" class="palette-list"></ul>
			</div>
		</div>
		<div id="drop-overlay" class="drop-overlay" hidden>
			<div class="drop-card">
				<div class="drop-icon" aria-hidden="true">⬇</div>
				<p>Drop Markdown to import</p>
				<span>.md · .markdown · .txt</span>
			</div>
		</div>
		<script type="module" src="bundle.js"></script>
	</body>
</html>
