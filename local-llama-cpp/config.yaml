name: Local llama.cpp
version: "1.9.0"
slug: local_llama_cpp
description: Local OpenAI-compatible llama.cpp server with Hugging Face model downloads
arch:
  - aarch64
startup: services
boot: auto
init: false
ingress: true
ingress_port: 8080
panel_icon: mdi:robot
panel_title: Local LLM
panel_admin: false
ports:
  8080/tcp: 8080
ports_description:
  8080/tcp: OpenAI-compatible API
map:
  - type: data
    read_only: false
    path: /data
options:
  manager_token: ""
  hf_repo: Qwen/Qwen3-1.7B-GGUF
  hf_file: Qwen3-1.7B-Q8_0.gguf
  hf_token: ""
  model_path: ""
  context_size: 8192
  threads: 4
  threads_batch: 4
  batch_size: 512
  ubatch_size: 128
  cache_reuse: 256
  jinja: true
  kv_unified: true
  flash_attention: false
  reasoning_format: deepseek
  reasoning_mode: auto
schema:
  manager_token: password
  hf_repo: str
  hf_file: str
  hf_token: password
  model_path: str
  context_size: int
  threads: int
  threads_batch: int
  batch_size: int
  ubatch_size: int
  cache_reuse: int
  jinja: bool
  kv_unified: bool
  flash_attention: bool
  reasoning_format: list(none|deepseek|deepseek-legacy)
  reasoning_mode: list(on|off|auto)
