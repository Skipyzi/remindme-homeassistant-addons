name: Local llama.cpp
version: "1.2.0"
slug: local_llama_cpp
description: Local OpenAI-compatible llama.cpp server with Hugging Face model downloads
arch:
  - aarch64
startup: services
boot: auto
init: false
ports:
  8080/tcp: 8080
ports_description:
  8080/tcp: OpenAI-compatible API
map:
  - type: data
    read_only: false
    path: /data
options:
  hf_repo: Qwen/Qwen3-1.7B-GGUF
  hf_file: Qwen3-1.7B-Q8_0.gguf
  hf_token: ""
  model_path: ""
  context_size: 4096
  threads: 4
schema:
  hf_repo: str
  hf_file: str
  hf_token: password
  model_path: str
  context_size: int
  threads: int
