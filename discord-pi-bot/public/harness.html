<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>RemindMe AI</title><style>
:root{color-scheme:dark;--bg:#0b0f14;--panel:#121923;--panel2:#182230;--mint:#7cffb2;--blue:#8ba7ff;--muted:#8793a5;--line:#263243}*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at 80% -20%,#1b3150 0,#0b0f14 42%);color:#e8eef5;font:15px Inter,system-ui,sans-serif}main{max-width:1050px;margin:auto;min-height:100vh;display:grid;grid-template-columns:190px 1fr;gap:1px;background:var(--line)}aside{background:var(--bg);padding:24px 16px}aside h1{font:700 19px 'Space Grotesk',sans-serif;color:var(--mint);letter-spacing:-.04em}aside p{color:var(--muted);font-size:12px;line-height:1.5}.nav{margin-top:36px;display:grid;gap:8px}.nav button{background:transparent;border:0;color:var(--muted);text-align:left;padding:10px;border-radius:8px;cursor:pointer}.nav button:hover{background:var(--panel);color:#fff}.status{position:fixed;bottom:18px;color:var(--muted);font:11px monospace}section{background:rgba(18,25,35,.9);display:flex;flex-direction:column;min-height:100vh}.top{padding:20px 28px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center}.top strong{font:600 18px 'Space Grotesk',sans-serif}.badge{color:var(--mint);font:11px monospace}.chat{flex:1;padding:30px;overflow:auto;max-width:850px;width:100%;margin:auto}.bubble{padding:15px 18px;border-radius:12px;margin:16px 0;line-height:1.65;white-space:pre-wrap}.user{background:#1c3150;margin-left:16%;border:1px solid #2d527c}.assistant{background:var(--panel2);margin-right:8%;border-left:3px solid var(--mint)}.tool{background:#20202a;color:#fcd477;border-left:3px solid #fcd477;font:12px monospace}.thinking{border-left:3px solid var(--blue);color:#b8c7ed}.thinking summary{cursor:pointer;color:var(--blue);font-weight:600}.composer{padding:18px 30px;border-top:1px solid var(--line);background:var(--bg)}form{max-width:850px;margin:auto;display:flex;gap:10px}textarea{flex:1;background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:13px;color:#fff;resize:none;min-height:48px}button.send{background:var(--mint);color:#07130d;border:0;border-radius:9px;padding:0 20px;font-weight:700;cursor:pointer}.controls{max-width:850px;margin:10px auto 0;display:flex;gap:8px;align-items:center;color:var(--muted);font-size:12px}.controls select{background:var(--panel);border:1px solid var(--line);color:#fff;border-radius:6px;padding:5px}@media(max-width:700px){main{display:block}aside{display:none}.chat{padding:18px}.user,.assistant{margin-left:0;margin-right:0}}
</style></head><body><main><aside><h1>◉ RemindMe AI</h1><p>Local home assistant with visible tools.</p><div class="nav"><button id="new">＋ New chat</button><button id="clear">Clear conversation</button></div><div class="status" id="status">connecting…</div></aside><section><header class="top"><strong>Home console</strong><span class="badge" id="model">LOCAL • QWEN</span></header><div class="chat" id="chat"><div class="bubble assistant">Ask about your home, reminders, or search the web.</div></div><div class="composer"><form><textarea rows="1" placeholder="Ask RemindMe anything…"></textarea><button class="send">Send ↑</button></form><div class="controls"><label>Thinking <select id="thinking"><option value="fast">Off / fast</option><option value="balanced">Balanced</option><option value="deep">Deep</option></select></label><span>Images unavailable for the current text model</span></div></div></section></main><script>
const chat=document.querySelector('#chat'),form=document.querySelector('form'),input=document.querySelector('textarea'),thinking=document.querySelector('#thinking');
function bubble(cls,text){const el=document.createElement('div');el.className='bubble '+cls;el.textContent=text;chat.append(el);chat.scrollTop=chat.scrollHeight;return el}
function thinkingBox(){const d=document.createElement('details');d.open=false;d.className='bubble thinking';const s=document.createElement('summary');s.textContent='Thinking / tools running…';const p=document.createElement('div');p.textContent='Waiting for the local model.';d.append(s,p);chat.append(d);return d}
form.addEventListener('submit',async e=>{e.preventDefault();const text=input.value.trim();if(!text)return;input.value='';bubble('user','You: '+text);const wait=thinkingBox();try{const r=await fetch('./api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:text,thinkingMode:thinking.value})});const data=await r.json();wait.remove();bubble(r.ok?'assistant':'tool',r.ok?'AI: '+data.response:'Error: '+(data.error||'request failed'));}catch(error){wait.querySelector('div').textContent=error.message;wait.open=true;}});
document.querySelector('#new').onclick=()=>{while(chat.firstChild)chat.firstChild.remove();bubble('assistant','New conversation started.')};document.querySelector('#clear').onclick=()=>{while(chat.firstChild)chat.firstChild.remove()};fetch('./api/status').then(r=>r.json()).then(d=>{document.querySelector('#model').textContent='LOCAL • '+d.model;document.querySelector('#status').textContent='● local tools ready'}).catch(()=>document.querySelector('#status').textContent='● offline');
</script></body></html>
