name: RemindMe Discord Bot
version: "2.45.0"
slug: remindme_discord_bot
description: Discord bot with reminders, pi-agent bridge, and local LLM support
arch:
  - aarch64
startup: application
boot: auto
init: false
homeassistant_api: true
hassio_api: true
ingress: true
ingress_port: 8090
panel_icon: mdi:robot-outline
panel_title: RemindMe AI
panel_admin: false
options:
  discord_token: ""
  owner_id: ""
  pi_agent_webhook_url: ""
  local_llm_enabled: true
  local_llm_url: http://homeassistant:8080/v1/chat/completions
  local_llm_model: qwen3-1.7b
  local_llm_context_size: 8192
  local_llm_vision: false
  model_manager_enabled: true
  model_manager_url: http://homeassistant:8080/manager/v1
  searxng_url: ""
  exa_api_key: ""
  ha_notify_target: ""
  vault_url: ""
schema:
  discord_token: password
  owner_id: str
  pi_agent_webhook_url: str
  local_llm_enabled: bool
  local_llm_url: str
  local_llm_model: str
  local_llm_context_size: int(1024,32768)
  local_llm_vision: bool
  model_manager_enabled: bool
  model_manager_url: str
  searxng_url: str?
  exa_api_key: password
  ha_notify_target: str
  vault_url: str?
map:
  - type: data
    read_only: false
    path: /data
  # The Markdown vault lives here so the remindme-vault editor add-on and this
  # add-on share the same files; the bot both reads and writes notes (model
  # memory), so rw.
  - type: share
    read_only: false
    path: /share
